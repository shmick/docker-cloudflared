name: Create and publish a Docker image

on:
  push:
    branches:
      - 'main'
    paths:
      - 'Dockerfile'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Set APPVER ENV
        run: echo "APPVER=$(grep "ARG VERSION" Dockerfile | awk -F\" '{print $2}')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/${{ github.repository }}
          labels: |
            org.opencontainers.image.title=Cloudflared
            org.opencontainers.image.description=Multi-arch Cloudflared tunnel
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.APPVER }}
        
      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: .
          platforms: linux/arm/v7,linux/arm64,linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
